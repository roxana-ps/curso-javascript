<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sitio de reseñas de libros</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- Navbar Bootstrap -->
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
        <div class="container">

            <a class="navbar-brand" href="#">Libros y libros</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Reseñas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>

        </div>
    </nav>

    <!-- HEADER -->
    <header class="text-center p-3">
        <h1>Reseñas de Libros</h1>
    </header>

    <div class="layout">

        <!-- Tarjetas -->
        <main class="container-cards">

            <div class="libro-card">
                <h2>Lord Toede</h2>
                <p>Jeff Grubb</p>
                <img src="assets/img/Lord_Toede.jpg" alt="Portada libro Lord Toede">
            </div>

            <div class="libro-card">
                <h2>F2F</h2>
                <p>Phillip Finch</p>
                <img src="assets/img/f2f.webp" alt="Portada libro face to face">

            </div>

            <div class="libro-card">
                <h2>1984</h2>
                <p>George Orwell</p>
                <img src="assets/img/1984.webp" alt="Portada libro 1984">
            </div>

        </main>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Reseñas de Libros</p>
    </footer>

    <!-- JS BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
